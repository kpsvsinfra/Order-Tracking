<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Tracker</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f2f2f2;
}

.container{
    width:90%;
    max-width:700px;
    margin:40px auto;
    background:white;
    border-radius:10px;
    padding:30px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    margin-top:15px;
    box-sizing:border-box;
}

button{

    width:100%;
    padding:14px;
    margin-top:20px;
    font-size:18px;
    cursor:pointer;
    background:#1976D2;
    color:white;
    border:none;
    border-radius:5px;

}

button:hover{

    background:#1259a7;

}

table{

    width:100%;
    border-collapse:collapse;
    margin-top:30px;

}

th{

    background:#1976D2;
    color:white;
    padding:12px;

}

td{

    border:1px solid #ddd;
    padding:12px;

}

.status{

    font-weight:bold;
    color:green;

}

</style>

</head>

<body>

<div class="container">

<h1>Track Your Order</h1>

<input
type="text"
id="order"
placeholder="Enter Order ID (Example: ORD1001)">

<button onclick="trackOrder()">
Track Order
</button>

<div id="result"></div>

</div>

<script>

const api="https://script.google.com/macros/s/AKfycbznL33DddqCrK1zbIx1KrzcrcOIB6ivKU58HRaGxUPSwAcChgRDMiDkW2jD8rA7L1k-/exec";

async function trackOrder(){

let order=document.getElementById("order").value.trim();

if(order===""){

    alert("Please enter an Order ID.");

    return;

}

let response=await fetch(api+"?order="+encodeURIComponent(order));

let data=await response.json();

if(data.found){

document.getElementById("result").innerHTML=`

<table>

<tr>

<th colspan="2">

Order Details

</th>

</tr>

<tr>

<td><b>Order ID</b></td>

<td>${data.orderID}</td>

</tr>

<tr>

<td><b>Customer Name</b></td>

<td>${data.customer}</td>

</tr>

<tr>

<td><b>Product</b></td>

<td>${data.product}</td>

</tr>

<tr>

<td><b>Order Date</b></td>

<td>${data.orderDate}</td>

</tr>

<tr>

<td><b>Status</b></td>

<td class="status">${data.status}</td>

</tr>

<tr>

<td><b>Tracking Number</b></td>

<td>${data.tracking}</td>

</tr>

<tr>

<td><b>Estimated Delivery</b></td>

<td>${data.estimatedDelivery}</td>

</tr>

<tr>

<td><b>Notes</b></td>

<td>${data.notes}</td>

</tr>

</table>

`;

}else{

document.getElementById("result").innerHTML="<h2>Order Not Found</h2>";

}

}

</script>

</body>

</html>
